name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install AppImage build dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build AppImage
        run: |
          chmod +x build/appimage.sh
          ./build/appimage.sh "${GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/*.AppImage
          if-no-files-found: error

  # build-windows:
  #   runs-on: windows-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: 8.0.x

  #     - name: Publish Windows build
  #       run: |
  #         dotnet publish Gw2PveDesktop/Gw2PveDesktop.csproj `
  #           -c Release `
  #           -r win-x64 `
  #           -p:DebugType=none `
  #           -o publish/win-x64

  #     - name: Zip Windows build
  #       run: |
  #         Compress-Archive -Path publish/win-x64/* -DestinationPath Gw2PveDesktop-win-x64.zip

  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: windows-x64
  #         path: Gw2PveDesktop-win-x64.zip
  #         if-no-files-found: error

  release:
    # needs: [build-linux, build-windows]
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
